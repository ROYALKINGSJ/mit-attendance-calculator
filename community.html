<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIT Hub | Community</title>
    <link rel="icon" href="https://fav.farm/⚡" />
    <style>
        /* --- UNIFIED THEME VARIABLES --- */
        :root {
            --bg-color: #0f172a; --card-bg: #1e293b; --text-color: #f1f5f9; --text-secondary: #94a3b8;
            --accent-color: #3b82f6; --accent-hover: #2563eb; --border-color: #334155; --input-bg: #0f172a;
            --success-color: #22c55e; --danger-color: #ef4444; 
        }
        [data-theme="light"] {
            --bg-color: #f8fafc; --card-bg: #ffffff; --text-color: #0f172a; --text-secondary: #64748b;
            --accent-color: #2563eb; --accent-hover: #1d4ed8; --border-color: #e2e8f0; --input-bg: #f1f5f9;
            --success-color: #16a34a; --danger-color: #dc2626; 
        }

        /* --- GLOBAL STYLES --- */
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 40px 20px; box-sizing: border-box; transition: background-color 0.3s, color 0.3s; }
        .container { background-color: var(--card-bg); padding: 2.5rem; border-radius: 1rem; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2); width: 100%; max-width: 800px; position: relative; border: 1px solid var(--border-color); min-height: 600px; }

        /* --- HEADER & NAV --- */
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; height: 40px; }
        .header-actions { display: flex; gap: 10px; align-items: center;}
        .theme-toggle, .btn-auth { background: none; border: 1px solid var(--border-color); cursor: pointer; color: var(--text-color); padding: 6px 12px; border-radius: 8px; font-size: 0.85rem; transition: all 0.2s; display: flex; align-items: center; gap: 5px; height: 32px; font-weight: bold;}
        .theme-toggle:hover, .btn-auth:hover { background: var(--input-bg); border-color: var(--text-secondary); }
        .btn-auth { color: var(--accent-color); border-color: var(--accent-color); display: none; } 

        .nav-container { display: flex; background-color: var(--input-bg); padding: 5px; border-radius: 10px; margin-bottom: 30px; border: 1px solid var(--border-color); }
        .nav-tab { flex: 1; text-align: center; padding: 10px 0; font-size: 0.95rem; font-weight: 600; color: var(--text-secondary); text-decoration: none; border-radius: 8px; transition: all 0.2s ease; cursor: pointer; display: block; }
        .nav-tab:hover { color: var(--text-color); background-color: rgba(125, 125, 125, 0.1); }
        .nav-tab.active { background-color: var(--card-bg); color: var(--accent-color); box-shadow: 0 2px 5px rgba(0,0,0,0.1); border: 1px solid var(--border-color); }

        h1 { text-align: center; margin: 0 0 8px 0; font-size: 2rem; letter-spacing: -0.5px; }
        .subtitle { text-align: center; color: var(--text-secondary); font-size: 1rem; margin-bottom: 30px; }
        
        /* --- MARKETPLACE UI --- */
        .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .project-card { background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; transition: transform 0.2s, box-shadow 0.2s; position: relative; }
        .project-card:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); border-color: var(--text-secondary); }
        .proj-title { font-size: 1.2rem; font-weight: 700; margin: 0 0 10px 0; color: var(--text-color); }
        .proj-desc { font-size: 0.9rem; color: var(--text-secondary); margin: 0 0 20px 0; line-height: 1.5; flex-grow: 1; }
        
        .action-btn { background: transparent; border: 1px solid var(--accent-color); color: var(--accent-color); padding: 10px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.2s ease; text-transform: uppercase; letter-spacing: 0.5px; font-size: 0.85rem; width: 100%; display: block; box-sizing: border-box; text-decoration: none; }
        .action-btn:hover { background: var(--accent-color); color: white; }
        
        .service-price { font-size: 1.3rem; font-weight: 700; color: var(--success-color); margin-bottom: 12px; }
        
        /* New Header Row for Delete Button */
        .service-header-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .service-user { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--text-secondary); font-weight: 500; }
        .service-user img { width: 24px; height: 24px; border-radius: 50%; background: var(--border-color); }
        
        /* Delete Button Styles */
        .delete-btn { background: none; border: none; font-size: 1.1rem; cursor: pointer; padding: 4px; border-radius: 6px; transition: background 0.2s; filter: grayscale(100%); opacity: 0.6; }
        .delete-btn:hover { background: rgba(239, 68, 68, 0.1); filter: grayscale(0%); opacity: 1; }

        .service-image { width: 100%; height: 140px; object-fit: cover; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--border-color); }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        .btn-calc { width: 100%; padding: 14px; background-color: var(--accent-color); color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 1rem; font-weight: 600; transition: background-color 0.2s; }
        .btn-calc:hover { background-color: var(--accent-hover); }

        /* --- MODAL (POST SERVICE) --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 1000; display: none; justify-content: center; align-items: center; }
        .modal-box { background: var(--card-bg); padding: 30px; border-radius: 16px; border: 1px solid var(--border-color); width: 90%; max-width: 450px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 1.2rem; font-weight: bold; }
        .close-btn { background: none; border: none; color: var(--text-secondary); font-size: 1.5rem; cursor: pointer; }
        .close-btn:hover { color: var(--danger-color); }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-secondary); }
        .input-group input, .input-group textarea { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-color); box-sizing: border-box; font-family: 'Inter', sans-serif;}
        .input-group input:focus, .input-group textarea:focus { outline: none; border-color: var(--accent-color); }
        input[type="file"] { padding: 8px; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="container">
    
    <div class="header-top">
        <div id="user-profile-badge" style="display:none; align-items:center; gap:8px; font-size:0.9rem; font-weight:bold;">
            <img id="user-avatar" src="" style="width:28px; height:28px; border-radius:50%; border:1px solid var(--border-color);">
            <span id="user-name-display"></span>
        </div>
        <div style="flex-grow: 1;"></div>
        <div class="header-actions">
            <button class="btn-auth" id="auth-btn">LOGIN</button>
            <button class="theme-toggle" onclick="toggleTheme()" id="theme-icon">☀️ Light Mode</button>
        </div>
    </div>

    <div class="nav-container">
        <a href="index.html" class="nav-tab">📊 Attendance</a>
        <a href="code.html" class="nav-tab">💻 Code</a>
        <a href="community.html" class="nav-tab active">⚡ Community</a>
    </div>

    <h1>MIT Hub</h1>
    <p class="subtitle">Semester Planner & Services</p>
    
    <div id="services-panel">
        <div class="section-header">
            <h3 style="margin:0;">Peer Services</h3>
            <button class="action-btn" id="post-service-btn" style="width: auto; padding: 6px 16px; display: none;">+ Post Service</button>
        </div>
        
        <div id="auth-firewall" style="text-align: center; padding: 40px; background: var(--input-bg); border-radius: 12px; border: 1px solid var(--border-color);">
            <div style="color: #00a4ef; font-size: 2.5rem; margin-bottom: 10px;">🛡️</div>
            <h2 style="margin: 0 0 10px 0;">Student Access Only</h2>
            <p style="color: var(--text-secondary); margin-bottom: 25px;">Authenticate with your MIT Microsoft account to access the peer community.</p>
            <button class="btn-calc" id="ms-login-btn" style="max-width: 250px; margin: 0 auto; display: flex; align-items: center; justify-content: center; gap: 10px; background-color: #00a4ef;">
                <svg width="18" height="18" viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg"><path d="M0 0h10v10H0zM11 0h10v10H11zM0 11h10v10H0zM11 11h10v10H11z" fill="#fff"/></svg>
                Sign in with Microsoft
            </button>
            <div id="auth-status" style="font-size:0.85rem; color:var(--danger-color); min-height: 20px; margin-top:15px; font-weight:500;"></div>
        </div>

        <div class="projects-grid" id="marketplace-container" style="display: none;"></div>
    </div>
</div>

<div class="modal-overlay" id="post-modal">
    <div class="modal-box">
        <div class="modal-header">
            <span>New Deployment</span>
            <button class="close-btn" id="close-modal-btn">&times;</button>
        </div>
        <div class="input-group">
            <label>Title</label>
            <input type="text" id="post-title" placeholder="e.g. C# Debugging Help" required>
        </div>
        <div class="input-group">
            <label>Price</label>
            <input type="text" id="post-price" placeholder="e.g. ₹500 / hr" required>
        </div>
        <div class="input-group">
            <label>WhatsApp Number (Include Country Code)</label>
            <input type="number" id="post-phone" placeholder="919876543210" required>
        </div>
        <div class="input-group">
            <label>Description</label>
            <textarea id="post-desc" rows="3" placeholder="Describe the service..." required></textarea>
        </div>
        <div class="input-group">
            <label>Auto-Delete After (Days) - Optional</label>
            <input type="number" id="post-expire" placeholder="e.g. 7 (Defaults to 30 days)" min="1">
        </div>
        <div class="input-group">
            <label>Preview Image (Max 5MB)</label>
            <input type="file" id="post-image" accept="image/png, image/jpeg">
        </div>
        <button class="btn-calc" id="submit-post-btn">Deploy Service</button>
        <div id="upload-status" style="text-align:center; margin-top:10px; font-size:0.85rem; color:var(--text-secondary);"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-analytics.js";
    // NOTE: Swapped back to signInWithPopup instead of Redirect
    import { getAuth, OAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

    // Your exact Firebase configuration
    const firebaseConfig = {
        apiKey: "AIzaSyCgTE8utYTeZLaeZd2nWD1tvD9oobDcnmY",
        authDomain: "mit-community-posting.firebaseapp.com",
        projectId: "mit-community-posting",
        storageBucket: "mit-community-posting.firebasestorage.app",
        messagingSenderId: "372822838540",
        appId: "1:372822838540:web:3147a0a558233c7e3a8d29",
        measurementId: "G-5Y5LFV9H3Z"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const auth = getAuth(app);
    const db = getFirestore(app);
    
    // Initialize Microsoft Provider
    const msProvider = new OAuthProvider('microsoft.com');

    // DOM Elements
    const authBtn = document.getElementById('auth-btn');
    const authFirewall = document.getElementById('auth-firewall');
    const marketplaceContainer = document.getElementById('marketplace-container');
    const postServiceBtn = document.getElementById('post-service-btn');
    const userBadge = document.getElementById('user-profile-badge');
    const msLoginBtn = document.getElementById('ms-login-btn');
    const authStatus = document.getElementById('auth-status');
    
    // --- MANIPAL DOMAIN LOCK ---
    const COLLEGE_DOMAIN = "@learner.manipal.edu"; 
    const ADMIN_OVERRIDE_EMAIL = "technologiccompany.sanskar@gmail.com";
    let currentUser = null;

    // --- BULLETPROOF ACCESS CHECKER ---
    const verifyAccess = async (user) => {
        if (!user) return false;
        
        // Safely grab the email, force lowercase, and handle nulls
        const userEmail = (user.email || "").toLowerCase();
        const collegeDomain = COLLEGE_DOMAIN.toLowerCase();
        const adminEmail = ADMIN_OVERRIDE_EMAIL.toLowerCase();

        if (!userEmail.endsWith(collegeDomain) && userEmail !== adminEmail) {
            await signOut(auth);
            authStatus.style.color = "var(--danger-color)";
            authStatus.innerText = `Access Denied: Unrecognized email (${userEmail || "No Email Provided"}).`;
            return false;
        }
        return true;
    };

    // --- GATEKEEPER LOGIN LOGIC (Reverted to Popup) ---
    const loginWithMicrosoft = async () => {
        try {
            authStatus.style.color = "var(--text-secondary)";
            authStatus.innerText = "Opening secure login window...";
            
            const result = await signInWithPopup(auth, msProvider);
            
            if (result && result.user) {
                await verifyAccess(result.user);
            }
        } catch (error) {
            console.error("Popup login failed:", error);
            authStatus.style.color = "var(--danger-color)";
            
            // Handle specific popup closure and credential conflicts
            if (error.code === 'auth/popup-closed-by-user') {
                authStatus.innerText = "Authentication was cancelled. Please complete the login in the popup window.";
            } else if (error.code === 'auth/account-exists-with-different-credential') {
                authStatus.innerText = "Conflict: This email is registered via password. Please delete the old user in Firebase Auth.";
            } else {
                authStatus.innerText = "Secure login failed or was blocked. If you are using a strict browser, ensure popups are allowed.";
            }
        }
    };

    authBtn.style.display = 'block'; 
    authBtn.addEventListener('click', () => {
        if (currentUser) {
            signOut(auth).then(() => window.location.reload());
        } else {
            window.scrollTo(0,0);
        }
    });
    
    msLoginBtn.addEventListener('click', loginWithMicrosoft);

    // --- LIVE AUTH STATE MONITOR ---
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const isAllowed = await verifyAccess(user);
            if (!isAllowed) return; // Stop executing if they got kicked out

            currentUser = user;
            authBtn.innerText = "LOGOUT";
            authFirewall.style.display = 'none';
            marketplaceContainer.style.display = 'grid';
            postServiceBtn.style.display = 'block';
            
            userBadge.style.display = 'flex';
            document.getElementById('user-avatar').src = user.photoURL || "https://cdn-icons-png.flaticon.com/512/847/847969.png"; 
            document.getElementById('user-name-display').innerText = user.displayName || user.email.split('@')[0];
            
            fetchServices();
        } else {
            currentUser = null;
            authBtn.innerText = "LOGIN";
            authFirewall.style.display = 'block';
            marketplaceContainer.style.display = 'none';
            postServiceBtn.style.display = 'none';
            userBadge.style.display = 'none';
        }
    });

    // --- GLOBAL DELETE FUNCTION ---
    window.deleteService = async (docId) => {
        if (confirm("Are you sure you want to permanently delete this service deployment?")) {
            try {
                await deleteDoc(doc(db, "services", docId));
                console.log("Document successfully deleted");
            } catch (error) {
                console.error("Error removing document: ", error);
                alert("Failed to delete post. Are you sure you own it?");
            }
        }
    };

    // --- MARKETPLACE SYNC & AUTO-DELETE FILTER ---
    function fetchServices() {
        const q = query(collection(db, "services"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            marketplaceContainer.innerHTML = '';
            let activePostsCount = 0;
            const now = Date.now();

            snapshot.forEach((snapshotDoc) => {
                const srv = snapshotDoc.data();
                const docId = snapshotDoc.id;

                // Auto-Delete Lazy Cleanup logic
                if (srv.expiresAt && now > srv.expiresAt) {
                    deleteDoc(doc(db, "services", docId)).catch(err => console.error("Auto-cleanup failed:", err));
                    return; 
                }

                activePostsCount++;

                // Build Delete Button
                let deleteBtnHtml = '';
                if (currentUser && currentUser.uid === srv.userId) {
                    deleteBtnHtml = `<button class="delete-btn" onclick="window.deleteService('${docId}')" title="Delete Post">🗑️</button>`;
                }

                const msgText = encodeURIComponent(`Hey ${srv.userName}, I'm interested in your service: "${srv.title}"`);
                const waLink = `https://wa.me/${srv.phone}?text=${msgText}`;

                marketplaceContainer.innerHTML += `
                    <div class="project-card" id="post-${docId}">
                        ${srv.imageUrl ? `<img src="${srv.imageUrl}" class="service-image" alt="Preview">` : ''}
                        
                        <div class="service-header-row">
                            <div class="service-user">
                                <img src="${srv.userAvatar}" alt="user">
                                <span>${srv.userName}</span>
                            </div>
                            ${deleteBtnHtml}
                        </div>

                        <h3 class="proj-title">${srv.title}</h3>
                        <div class="service-price">${srv.price}</div>
                        <p class="proj-desc">${srv.desc}</p>
                        <div style="margin-top: auto;">
                            <a href="${waLink}" target="_blank" class="action-btn">Whatsapp Contact</a>
                        </div>
                    </div>
                `;
            });
            
            if(activePostsCount === 0) {
                marketplaceContainer.innerHTML = `<div style="color:var(--text-secondary); grid-column: 1 / -1; text-align:center; padding: 40px 0;">No active deployments. Be the first to post.</div>`;
            }
        });
    }

    // --- MODAL DEPLOYMENT & CREATION LOGIC ---
    const postModal = document.getElementById('post-modal');
    const closeModalBtn = document.getElementById('close-modal-btn');
    const submitPostBtn = document.getElementById('submit-post-btn');
    const uploadStatus = document.getElementById('upload-status');

    postServiceBtn.addEventListener('click', () => postModal.style.display = 'flex');
    closeModalBtn.addEventListener('click', () => postModal.style.display = 'none');

    submitPostBtn.addEventListener('click', async () => {
        const title = document.getElementById('post-title').value.trim();
        const price = document.getElementById('post-price').value.trim();
        const phone = document.getElementById('post-phone').value.trim();
        const desc = document.getElementById('post-desc').value.trim();
        const expireDays = document.getElementById('post-expire').value.trim(); 
        const fileInput = document.getElementById('post-image');
        const file = fileInput.files[0];

        if(!title || !price || !phone || !desc) { 
            alert("All primary text arrays must be filled."); 
            return; 
        }

        // Calculate precise expiration timestamp (Defaults to 30 days)
        let finalDays = 30; // Default fallback
        if (expireDays && !isNaN(expireDays) && expireDays > 0) {
            finalDays = parseInt(expireDays);
        }
        const expiresAt = Date.now() + (finalDays * 24 * 60 * 60 * 1000);

        submitPostBtn.disabled = true;
        uploadStatus.innerText = "Initializing deployment parameters...";

        let imageUrl = null;
        try {
            // ImgBB Upload Pipeline
            if (file) {
                if(file.size > 5242880) { 
                    alert("Asset size overflow. Image must be under 5MB.");
                    submitPostBtn.disabled = false; uploadStatus.innerText = ""; return;
                }
                uploadStatus.innerText = "Uploading visual asset to external host (ImgBB)...";
                const formData = new FormData(); formData.append("image", file);
                const imgbbResponse = await fetch("https://api.imgbb.com/1/upload?key=ff1ce4c0d634dc29f5396f689506c356", {
                    method: "POST", body: formData
                });
                const imgData = await imgbbResponse.json();
                if (imgData.success) { imageUrl = imgData.data.url; } 
                else { throw new Error("ImgBB Upload Failed: " + (imgData.error?.message || "Unknown error")); }
            }

            // Commit document record to Firestore database
            uploadStatus.innerText = "Writing payload to Firestore matrix...";
            await addDoc(collection(db, "services"), {
                title: title, 
                price: price, 
                phone: phone, 
                desc: desc, 
                imageUrl: imageUrl,
                expiresAt: expiresAt, 
                userId: currentUser.uid, 
                userName: currentUser.displayName || currentUser.email.split('@')[0], 
                userAvatar: currentUser.photoURL || "https://cdn-icons-png.flaticon.com/512/847/847969.png",
                createdAt: serverTimestamp()
            });

            // Clear input buffer fields
            document.getElementById('post-title').value = ''; 
            document.getElementById('post-price').value = '';
            document.getElementById('post-phone').value = ''; 
            document.getElementById('post-desc').value = '';
            document.getElementById('post-expire').value = '';
            fileInput.value = ''; 
            
            postModal.style.display = 'none';
        } catch (error) {
            console.error("Database commit failure", error);
            alert("Deployment pipeline crashed. Check local terminal console.");
        } finally {
            submitPostBtn.disabled = false; 
            uploadStatus.innerText = "";
        }
    });
</script>

<script>
    // --- BASIC THEME LOGIC (Vanilla JS) ---
    const themeToggleBtn = document.getElementById("theme-icon");
    const savedTheme = localStorage.getItem("theme") || "dark";
    document.documentElement.setAttribute("data-theme", savedTheme);
    themeToggleBtn.innerText = savedTheme === "light" ? "🌙 Dark Mode" : "☀️ Light Mode";

    function toggleTheme() {
        const newTheme = document.documentElement.getAttribute("data-theme") === "light" ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
        themeToggleBtn.innerText = newTheme === "light" ? "🌙 Dark Mode" : "☀️ Light Mode";
    }
</script>
</body>
</html>
