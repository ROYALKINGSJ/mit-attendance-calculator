<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S. Jaiswal | Dev Portal</title>
    <link rel="icon" href="https://fav.farm/🌌" />
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <canvas id="bgCanvas"></canvas>
    <div class="bg-grid-overlay"></div>

    <div class="top-nav">
        <button id="theme-toggle">☀️ LIGHT MODE</button>
    </div>

    <div class="main-wrapper">
        <div class="glass-panel identity-col">
            <div class="avatar-container">
                <img src="https://lh3.googleusercontent.com/a/ACg8ocKFA-dP9EbnH6eCuI2aiwCqBVqNmlQ_XFYmZFeR1BtWAtrrW3U=s576-c-no" alt="Sanskar Jaiswal" class="profile-pic">
            </div>
            
            <h1 class="name">Sanskar<br>Jaiswal</h1>
            <div class="title">Dev // Creator // Architect</div>
            
            <div class="bio">
                Building immersive digital experiences. Specializing in high-performance backends, game logic architectures, and scalable web infrastructure.
            </div>

            <div class="comms-grid" id="comms-container"></div>
        </div>

        <div class="content-col">
            <div class="glass-panel">
                <div class="section-header">Systems & Matrix</div>
                <div class="skills-container" id="skills-container"></div>
            </div>

            <div class="glass-panel" style="flex-grow: 1;">
                <div class="section-header">Active Deployments</div>
                <div class="projects-grid" id="projects-container"></div>
            </div>
        </div>
    </div>

    <div class="led-wrapper">
        <canvas id="ledCanvas"></canvas>
    </div>

    <script src="script.js"></script>
</body>
</html>
