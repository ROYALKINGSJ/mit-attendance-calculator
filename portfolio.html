<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S. Jaiswal | Dev Portal</title>
    <link rel="icon" href="https://fav.farm/🌌" />
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* We use CSS Variables here. 
               The '--dynamic-hue' is constantly changed by our JavaScript! 
               Purple is around 280, Blue is around 200.
            */
            --dynamic-hue: 275; 
            
            /* DARK THEME (Default) */
            --bg-deep: #05020a;
            --bg-panel: rgba(18, 10, 38, 0.45);
            --text-main: #e2e8f0;
            --text-muted: #8b82a5;
            --led-bg: rgba(2, 1, 5, 0.85);
            --glass-border: rgba(255, 255, 255, 0.05);
            
            /* Dynamic Glowing Accents based on the JS Hue */
            --accent-glow: hsla(var(--dynamic-hue), 100%, 60%, 1);
            --accent-dim: hsla(var(--dynamic-hue), 100%, 60%, 0.15);
            --accent-border: hsla(var(--dynamic-hue), 100%, 60%, 0.4);
            
            --font-ui: 'Rajdhani', sans-serif;
            --font-code: 'JetBrains Mono', monospace;
        }

        /* LIGHT THEME OVERRIDES */
        [data-theme="light"] {
            --bg-deep: #f1f5f9;
            --bg-panel: rgba(255, 255, 255, 0.6);
            --text-main: #0f172a;
            --text-muted: #475569;
            --led-bg: rgba(241, 245, 249, 0.85);
            --glass-border: rgba(0, 0, 0, 0.1);
            
            /* Very dark, bold accents for light mode */
            --accent-glow: hsla(var(--dynamic-hue), 90%, 25%, 1);
            --accent-dim: hsla(var(--dynamic-hue), 90%, 25%, 0.1);
            --accent-border: hsla(var(--dynamic-hue), 90%, 25%, 0.4);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-ui);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
            transition: background-color 0.5s, color 0.5s;
        }

        /* Top Navigation */
        .top-nav {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            background: var(--bg-panel);
            border: 1px solid var(--glass-border);
            padding: 10px 30px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            z-index: 100;
            transition: all 0.5s;
        }

        .top-nav button {
            color: var(--text-muted);
            background: none;
            border: none;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.9rem;
            cursor: pointer;
            font-family: var(--font-ui);
            transition: color 0.3s, text-shadow 0.3s;
        }

        .top-nav button:hover {
            color: var(--accent-glow);
            text-shadow: 0 0 8px var(--accent-glow);
        }

        /* --- DYNAMIC ABSTRACT PLASMA BACKGROUND --- */
        .plasma-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: 
                linear-gradient(var(--accent-dim) 1px, transparent 1px),
                linear-gradient(90deg, var(--accent-dim) 1px, transparent 1px);
            background-size: 40px 40px;
            transition: background 0.5s;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.6;
            animation: floatOrb 25s infinite alternate ease-in-out;
            background: var(--accent-glow);
            transition: background 0.5s;
        }

        .orb-1 { width: 45vw; height: 45vw; top: -10%; left: -10%; }
        .orb-2 { width: 35vw; height: 35vw; bottom: -10%; right: -5%; animation-delay: -12s; animation-duration: 30s; filter: blur(90px); }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(10vw, 15vh) scale(1.1); }
            100% { transform: translate(20vw, -10vh) scale(0.9); }
        }

        /* --- GLASSMORPHIC CONTAINER --- */
        .main-wrapper {
            max-width: 1300px;
            margin: 80px auto 40px auto;
            width: 90%;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
            flex-grow: 1;
            z-index: 10;
        }

        .glass-panel {
            background: var(--bg-panel);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            padding: 35px;
            position: relative;
            overflow: hidden;
            transition: all 0.5s ease;
        }

        .glass-panel:hover {
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4), inset 0 0 20px var(--accent-dim);
            border-color: var(--accent-border);
        }

        /* --- LEFT PANEL: IDENTITY --- */
        .identity-col { display: flex; flex-direction: column; }

        .avatar-container {
            width: 120px;
            height: 120px;
            border-radius: 12px;
            background: var(--accent-glow);
            margin-bottom: 25px;
            padding: 3px;
            box-shadow: 0 0 25px var(--accent-dim);
            transition: background 0.5s, box-shadow 0.5s;
        }

        .avatar-inner {
            width: 100%; height: 100%;
            background-color: var(--bg-deep);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem;
            transition: background-color 0.5s;
        }

        h1.name {
            font-size: 2.5rem; margin: 0; line-height: 1.1; letter-spacing: 1px;
            color: var(--text-main);
        }

        .title {
            color: var(--accent-glow);
            font-family: var(--font-code);
            font-size: 0.9rem; margin-top: 10px; letter-spacing: 2px;
            text-transform: uppercase;
        }

        .bio {
            color: var(--text-muted);
            font-size: 1.05rem; margin-top: 25px; line-height: 1.6;
        }

        /* Comms Grid */
        .comms-grid {
            margin-top: auto; padding-top: 40px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
        }

        .comm-btn {
            background: var(--glass-border);
            border: 1px solid var(--glass-border);
            border-radius: 8px; padding: 12px;
            color: var(--text-main); text-decoration: none;
            display: flex; align-items: center; gap: 10px;
            font-size: 0.85rem; font-family: var(--font-code);
            transition: all 0.3s ease;
        }

        .comm-btn:hover {
            background: var(--accent-dim);
            border-color: var(--accent-glow);
            transform: translateY(-3px);
        }

        .comm-btn img {
            width: 18px; height: 18px;
            filter: invert(1); opacity: 0.8;
            transition: filter 0.5s;
        }
        
        [data-theme="light"] .comm-btn img { filter: invert(0); }

        /* --- RIGHT PANEL --- */
        .content-col { display: flex; flex-direction: column; gap: 40px; }

        .section-header {
            font-size: 1.3rem; letter-spacing: 3px; text-transform: uppercase;
            color: var(--text-main); margin-bottom: 20px;
            display: flex; align-items: center; gap: 15px;
        }

        .section-header::after {
            content: ''; flex-grow: 1; height: 1px; background: var(--glass-border);
        }

        .skills-container { display: flex; flex-wrap: wrap; gap: 10px; }

        .skill-node {
            background: var(--glass-border);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 8px 16px; border-radius: 4px;
            font-family: var(--font-code); font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .skill-node:hover {
            border-color: var(--accent-glow);
            box-shadow: 0 0 15px var(--accent-dim);
            background: var(--accent-dim);
        }

        .projects-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;
        }

        .project-card {
            background: var(--glass-border);
            border: 1px solid var(--glass-border);
            border-radius: 12px; padding: 20px;
            text-decoration: none; color: inherit;
            transition: all 0.3s ease;
            display: flex; flex-direction: column;
        }

        .project-card:hover {
            border-color: var(--accent-glow);
            background: var(--accent-dim);
            transform: translateY(-5px);
        }

        .proj-title { font-size: 1.3rem; font-weight: 700; margin: 0 0 10px 0; }
        .proj-desc { font-size: 0.95rem; color: var(--text-muted); margin: 0 0 20px 0; line-height: 1.5; flex-grow: 1; }

        .proj-meta {
            display: flex; justify-content: space-between; align-items: center;
            border-top: 1px solid var(--glass-border); padding-top: 12px;
            font-family: var(--font-code); font-size: 0.75rem;
        }

        .proj-status {
            color: var(--accent-glow); display: flex; align-items: center; gap: 6px; font-weight: bold;
        }
        
        .proj-status::before {
            content: ''; width: 6px; height: 6px; border-radius: 50%;
            background: var(--accent-glow); box-shadow: 0 0 8px var(--accent-glow);
        }

        /* --- THE GLITCHING LED MATRIX (CANVAS) --- */
        .led-wrapper {
            width: 100%; height: 180px;
            background: var(--led-bg);
            border-top: 2px solid var(--accent-border);
            margin-top: auto; position: relative;
            display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(10px);
            transition: background 0.5s, border-color 0.5s;
        }

        #ledCanvas { max-width: 100%; height: 100%; display: block; }

        @media (max-width: 960px) { .main-wrapper { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="plasma-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="top-nav">
        <button id="theme-toggle" onclick="toggleTheme()">☀️ LIGHT MODE</button>
    </div>

    <div class="main-wrapper">
        
        <div class="glass-panel identity-col">
            <div class="avatar-container">
                <div class="avatar-inner">👾</div>
            </div>
            
            <h1 class="name">Sanskar<br>Jaiswal</h1>
            <div class="title">Dev // Creator // Architect</div>
            
            <div class="bio">
                Building immersive digital experiences. Specializing in high-performance backends, game logic architectures, and scalable web infrastructure.
            </div>

            <div class="comms-grid" id="comms-container"></div>
        </div>

        <div class="content-col">
            
            <div class="glass-panel">
                <div class="section-header">Systems & Matrix</div>
                <div class="skills-container" id="skills-container"></div>
            </div>

            <div class="glass-panel" style="flex-grow: 1;">
                <div class="section-header">Active Deployments</div>
                <div class="projects-grid" id="projects-container"></div>
            </div>

        </div>
    </div>

    <div class="led-wrapper">
        <canvas id="ledCanvas"></canvas>
    </div>

    <script>
        // ==========================================
        // 1. THE CHROMA-SHIFT ENGINE (DYNAMIC COLORS)
        // ==========================================
        let currentHue = 275; // Starts at Purple
        let hueDirection = -0.05; // Negative goes towards blue (200)

        function updateColorTheme() {
            currentHue += hueDirection;
            
            // Ping-pong smoothly between Blue (200) and Purple (280)
            if (currentHue <= 200 || currentHue >= 280) {
                hueDirection *= -1; 
            }
            
            // Push the new color to the CSS Variables
            document.documentElement.style.setProperty('--dynamic-hue', currentHue);
            
            // Keep looping forever at 60 frames per second
            requestAnimationFrame(updateColorTheme);
        }
        
        // Start the engine!
        updateColorTheme();


        // ==========================================
        // 2. LIGHT / DARK MODE TOGGLE
        // ==========================================
        const savedTheme = localStorage.getItem("portfolio-theme") || "dark";
        document.documentElement.setAttribute("data-theme", savedTheme);
        updateThemeBtn(savedTheme);

        function toggleTheme() {
            const current = document.documentElement.getAttribute("data-theme");
            const newTheme = current === "light" ? "dark" : "light";
            document.documentElement.setAttribute("data-theme", newTheme);
            localStorage.setItem("portfolio-theme", newTheme);
            updateThemeBtn(newTheme);
        }

        function updateThemeBtn(theme) {
            document.getElementById("theme-toggle").innerText = theme === "light" ? "🌙 DARK MODE" : "☀️ LIGHT MODE";
        }


        // ==========================================
        // 3. DYNAMIC DATA CONFIGURATION
        // ==========================================
        const COMMUNICATIONS = [
            { name: "GitHub", url: "https://github.com/ROYALKINGSJ", icon: "https://cdn-icons-png.flaticon.com/512/733/733553.png" },
            { name: "Email", url: "mailto:technologiccompany.sanskar@gmail.com", icon: "https://cdn-icons-png.flaticon.com/512/732/732200.png" },
            { name: "LinkedIn", url: "#", icon: "https://cdn-icons-png.flaticon.com/512/3536/3536505.png" },
            { name: "Play Store", url: "#", icon: "https://cdn-icons-png.flaticon.com/512/888/888857.png" }
        ];

        const SKILLS = [
            "C# & Unity Engine", "Python & Pandas Dataframes", "Java Architecture", 
            "C / C++ Fundamentals", "SQL Database Management", "3D Modeling & Rendering"
        ];

        const PROJECTS = [
            {
                title: "Unity Physics Engine",
                desc: "Developing smooth player movement scripts and resolving complex physics jittering in 3D environments.",
                statusText: "ENGINE DEV",
                url: "#"
            },
            {
                title: "Open Source Contributor",
                desc: "Roadmap to GSoC 2027. Analyzing and contributing to major repositories like PSF, Zulip, and urllib3.",
                statusText: "PROTOCOL ACTIVE",
                url: "#"
            },
            {
                title: "MIT Attendance Hub",
                desc: "Full-stack portal featuring secure user auth, API key management, and automated CSV data handling.",
                statusText: "LIVE DEPLOYMENT",
                url: "https://github.com/ROYALKINGSJ/attendance-calculator"
            }
        ];

        // --- DOM RENDERER ---
        const commsDiv = document.getElementById('comms-container');
        COMMUNICATIONS.forEach(link => {
            commsDiv.innerHTML += `<a href="${link.url}" target="_blank" class="comm-btn"><img src="${link.icon}" alt="icon"> ${link.name}</a>`;
        });

        const skillsDiv = document.getElementById('skills-container');
        SKILLS.forEach(skill => {
            skillsDiv.innerHTML += `<div class="skill-node">${skill}</div>`;
        });

        const projectsDiv = document.getElementById('projects-container');
        PROJECTS.forEach(proj => {
            const targetAttr = proj.url !== "#" ? 'target="_blank"' : '';
            projectsDiv.innerHTML += `
                <a href="${proj.url}" ${targetAttr} class="project-card">
                    <h3 class="proj-title">${proj.title}</h3>
                    <p class="proj-desc">${proj.desc}</p>
                    <div class="proj-meta">
                        <div class="proj-status">${proj.statusText}</div>
                        <span>>_</span>
                    </div>
                </a>
            `;
        });

        // ==========================================
        // 4. LED MATRIX GLITCH ENGINE (CANVAS)
        // ==========================================
        const canvas = document.getElementById('ledCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        let dots = [];
        const DOT_SIZE = 4;
        const GAP = 2;
        const SPACING = DOT_SIZE + GAP;

        function initMatrix() {
            const wrapper = document.querySelector('.led-wrapper');
            canvas.width = wrapper.clientWidth;
            canvas.height = wrapper.clientHeight;

            const offCanvas = document.createElement('canvas');
            offCanvas.width = canvas.width;
            offCanvas.height = canvas.height;
            const oCtx = offCanvas.getContext('2d', { willReadFrequently: true });

            oCtx.fillStyle = 'white';
            oCtx.textBaseline = 'middle';
            oCtx.textAlign = 'center';
            
            const targetText = "SANSKAR JAISWAL";
            let fontSize = canvas.width / (targetText.length * 0.55); 
            if (fontSize > 110) fontSize = 110; 
            
            oCtx.font = `900 ${fontSize}px 'Rajdhani', sans-serif`;
            oCtx.fillText(targetText, canvas.width / 2, canvas.height / 2);

            const imgData = oCtx.getImageData(0, 0, canvas.width, canvas.height).data;
            dots = [];

            for (let y = 0; y < canvas.height; y += SPACING) {
                for (let x = 0; x < canvas.width; x += SPACING) {
                    const i = (y * canvas.width + x) * 4;
                    if (imgData[i + 3] > 128) {
                        dots.push({ x: x, y: y, baseAlpha: 1, currentAlpha: 1 });
                    }
                }
            }
        }

        let lastGlitchTime = 0;
        const GLITCH_SPEED_MS = 150; 

        function animateMatrix(timestamp) {
            if (!lastGlitchTime) lastGlitchTime = timestamp;
            const delta = timestamp - lastGlitchTime;

            // Recalculate glitch pattern slowly
            if (delta > GLITCH_SPEED_MS) {
                for (let i = 0; i < dots.length; i++) {
                    if (Math.random() < 0.12) {
                        dots[i].currentAlpha = 0.15; 
                    } else {
                        dots[i].currentAlpha = dots[i].baseAlpha; 
                    }
                }
                lastGlitchTime = timestamp;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.shadowBlur = 12;

            // Tie the Canvas color to the dynamic HTML theme!
            const theme = document.documentElement.getAttribute('data-theme');
            const lightness = theme === 'light' ? '25%' : '60%'; // Dark text for light mode
            
            ctx.shadowColor = `hsl(${currentHue}, 100%, ${lightness})`;

            for (let i = 0; i < dots.length; i++) {
                ctx.fillStyle = `hsla(${currentHue}, 100%, ${lightness}, ${dots[i].currentAlpha})`;
                ctx.fillRect(dots[i].x, dots[i].y, DOT_SIZE, DOT_SIZE);
            }

            requestAnimationFrame(animateMatrix);
        }

        window.addEventListener('resize', initMatrix);
        
        document.fonts.ready.then(() => {
            initMatrix();
            requestAnimationFrame(animateMatrix);
        });

    </script>
</body>
</html>
