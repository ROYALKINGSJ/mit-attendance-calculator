<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S. Jaiswal | Dev Portal</title>
    <link rel="icon" href="https://fav.farm/🌌" />
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* This hue is now driven by the average color of the chaotic background! */
            --dynamic-hue: 275; 
            
            /* DARK THEME */
            --bg-deep: #030108;
            --bg-panel: rgba(10, 5, 20, 0.4);
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --glass-border: rgba(255, 255, 255, 0.08);
            --led-bg: rgba(3, 1, 8, 0.85);
            
            /* Dynamic UI Glows */
            --accent-glow: hsla(var(--dynamic-hue), 100%, 60%, 1);
            --accent-dim: hsla(var(--dynamic-hue), 100%, 60%, 0.15);
            --accent-border: hsla(var(--dynamic-hue), 100%, 60%, 0.5);
            
            --font-ui: 'Rajdhani', sans-serif;
            --font-code: 'JetBrains Mono', monospace;
        }

        /* LIGHT THEME OVERRIDES */
        [data-theme="light"] {
            --bg-deep: #f8fafc;
            --bg-panel: rgba(255, 255, 255, 0.6);
            --text-main: #0f172a;
            --text-muted: #475569;
            --glass-border: rgba(0, 0, 0, 0.1);
            --led-bg: rgba(248, 250, 252, 0.85);
            
            /* Dark, intense accents for light mode */
            --accent-glow: hsla(var(--dynamic-hue), 90%, 30%, 1);
            --accent-dim: hsla(var(--dynamic-hue), 90%, 30%, 0.1);
            --accent-border: hsla(var(--dynamic-hue), 90%, 30%, 0.5);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-ui);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
            transition: background-color 0.5s, color 0.5s;
        }

        /* --- GENERATIVE ABSTRACT BACKGROUND --- */
        #bgCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -2;
        }

        /* Grid Overlay to give it that tech/HUD feel */
        .bg-grid-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            pointer-events: none;
            background: 
                linear-gradient(var(--glass-border) 1px, transparent 1px),
                linear-gradient(90deg, var(--glass-border) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.3;
        }

        /* Top Navigation */
        .top-nav {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            background: var(--bg-panel);
            border: 1px solid var(--glass-border);
            padding: 12px 35px;
            border-radius: 40px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 100;
            transition: all 0.5s;
        }

        .top-nav button {
            color: var(--text-muted);
            background: none;
            border: none;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.9rem;
            cursor: pointer;
            font-family: var(--font-ui);
            transition: color 0.3s, text-shadow 0.3s;
        }

        .top-nav button:hover {
            color: var(--accent-glow);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        /* --- GLASSMORPHIC CONTAINER --- */
        .main-wrapper {
            max-width: 1300px;
            margin: 100px auto 40px auto;
            width: 92%;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 35px;
            flex-grow: 1;
            z-index: 10;
        }

        .glass-panel {
            background: var(--bg-panel);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
            position: relative;
            overflow: hidden;
            transition: all 0.5s ease;
        }

        .glass-panel:hover {
            border-color: var(--accent-border);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.4), inset 0 0 30px var(--accent-dim);
        }

        /* --- LEFT PANEL: IDENTITY --- */
        .identity-col { display: flex; flex-direction: column; }

        .avatar-container {
            width: 130px;
            height: 130px;
            border-radius: 16px;
            background: var(--accent-glow);
            margin-bottom: 25px;
            padding: 4px;
            box-shadow: 0 0 30px var(--accent-dim);
            transition: background 0.3s, box-shadow 0.3s;
        }

        /* Custom Profile Picture Image */
        .profile-pic {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
            background-color: var(--bg-deep); /* Fallback */
        }

        h1.name {
            font-size: 2.8rem; margin: 0; line-height: 1.1; letter-spacing: 1px;
            color: var(--text-main);
        }

        .title {
            color: var(--accent-glow);
            font-family: var(--font-code);
            font-size: 0.95rem; margin-top: 12px; letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 15px var(--accent-dim);
            transition: color 0.3s, text-shadow 0.3s;
        }

        .bio {
            color: var(--text-muted);
            font-size: 1.1rem; margin-top: 25px; line-height: 1.6;
        }

        /* Comms Grid */
        .comms-grid {
            margin-top: auto; padding-top: 40px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
        }

        .comm-btn {
            background: var(--glass-border);
            border: 1px solid var(--glass-border);
            border-radius: 10px; padding: 12px;
            color: var(--text-main); text-decoration: none;
            display: flex; align-items: center; gap: 10px;
            font-size: 0.85rem; font-family: var(--font-code);
            transition: all 0.3s ease;
        }

        .comm-btn:hover {
            background: var(--accent-dim);
            border-color: var(--accent-glow);
            transform: translateY(-4px);
            box-shadow: 0 8px 20px var(--accent-dim);
        }

        .comm-btn img {
            width: 18px; height: 18px;
            filter: invert(1); opacity: 0.9;
            transition: filter 0.5s;
        }
        
        [data-theme="light"] .comm-btn img { filter: invert(0); }

        /* --- RIGHT PANEL --- */
        .content-col { display: flex; flex-direction: column; gap: 40px; }

        .section-header {
            font-size: 1.4rem; letter-spacing: 4px; text-transform: uppercase;
            color: var(--text-main); margin-bottom: 25px;
            display: flex; align-items: center; gap: 15px;
        }

        .section-header::after {
            content: ''; flex-grow: 1; height: 1px; background: var(--glass-border);
        }

        .skills-container { display: flex; flex-wrap: wrap; gap: 12px; }

        .skill-node {
            background: var(--glass-border);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 10px 18px; border-radius: 6px;
            font-family: var(--font-code); font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .skill-node:hover {
            border-color: var(--accent-glow);
            box-shadow: 0 0 20px var(--accent-dim);
            background: var(--accent-dim);
            transform: translateY(-2px);
        }

        .projects-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px;
        }

        .project-card {
            background: var(--glass-border);
            border: 1px solid var(--glass-border);
            border-radius: 14px; padding: 25px;
            text-decoration: none; color: inherit;
            transition: all 0.3s ease;
            display: flex; flex-direction: column;
        }

        .project-card:hover {
            border-color: var(--accent-glow);
            background: var(--accent-dim);
            transform: translateY(-6px);
            box-shadow: 0 10px 30px var(--accent-dim);
        }

        .proj-title { font-size: 1.4rem; font-weight: 700; margin: 0 0 12px 0; }
        .proj-desc { font-size: 1rem; color: var(--text-muted); margin: 0 0 25px 0; line-height: 1.5; flex-grow: 1; }

        .proj-meta {
            display: flex; justify-content: space-between; align-items: center;
            border-top: 1px solid var(--glass-border); padding-top: 15px;
            font-family: var(--font-code); font-size: 0.8rem;
        }

        .proj-status {
            color: var(--accent-glow); display: flex; align-items: center; gap: 8px; font-weight: bold;
            transition: color 0.3s;
        }
        
        .proj-status::before {
            content: ''; width: 8px; height: 8px; border-radius: 50%;
            background: var(--accent-glow); box-shadow: 0 0 10px var(--accent-glow);
            transition: background 0.3s, box-shadow 0.3s;
        }

        /* --- THE GLITCHING LED MATRIX (CANVAS) --- */
        .led-wrapper {
            width: 100%; height: 200px;
            background: var(--led-bg);
            border-top: 2px solid var(--accent-border);
            margin-top: auto; position: relative;
            display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(15px);
            transition: background 0.5s, border-color 0.5s;
        }

        #ledCanvas { max-width: 100%; height: 100%; display: block; }

        @media (max-width: 960px) { .main-wrapper { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>
    <div class="bg-grid-overlay"></div>

    <div class="top-nav">
        <button id="theme-toggle" onclick="toggleTheme()">☀️ LIGHT MODE</button>
    </div>

    <div class="main-wrapper">
        
        <div class="glass-panel identity-col">
            <div class="avatar-container">
                <img src="https://lh3.googleusercontent.com/a/ACg8ocKFA-dP9EbnH6eCuI2aiwCqBVqNmlQ_XFYmZFeR1BtWAtrrW3U=s576-c-no" alt="Sanskar Jaiswal" class="profile-pic">
            </div>
            
            <h1 class="name">Sanskar<br>Jaiswal</h1>
            <div class="title">Dev // Creator // Architect</div>
            
            <div class="bio">
                Building immersive digital experiences. Specializing in high-performance backends, game logic architectures, and scalable web infrastructure.
            </div>

            <div class="comms-grid" id="comms-container"></div>
        </div>

        <div class="content-col">
            
            <div class="glass-panel">
                <div class="section-header">Systems & Matrix</div>
                <div class="skills-container" id="skills-container"></div>
            </div>

            <div class="glass-panel" style="flex-grow: 1;">
                <div class="section-header">Active Deployments</div>
                <div class="projects-grid" id="projects-container"></div>
            </div>

        </div>
    </div>

    <div class="led-wrapper">
        <canvas id="ledCanvas"></canvas>
    </div>

    <script>
        // ==========================================
        // 1. DYNAMIC DATA CONFIGURATION
        // ==========================================
        const COMMUNICATIONS = [
            { name: "GitHub", url: "https://github.com/ROYALKINGSJ", icon: "https://cdn-icons-png.flaticon.com/512/733/733553.png" },
            { name: "Email", url: "mailto:technologiccompany.sanskar@gmail.com", icon: "https://cdn-icons-png.flaticon.com/512/732/732200.png" },
            { name: "LinkedIn", url: "#", icon: "https://cdn-icons-png.flaticon.com/512/3536/3536505.png" },
            { name: "Play Store", url: "#", icon: "https://cdn-icons-png.flaticon.com/512/888/888857.png" }
        ];

        const SKILLS = [
            "C# & Unity Engine", "Python & Pandas Dataframes", "Java Architecture", 
            "C / C++ Fundamentals", "SQL Database Management", "3D Modeling & Rendering"
        ];

        const PROJECTS = [
            {
                title: "Unity Physics Engine",
                desc: "Developing smooth player movement scripts and resolving complex physics jittering in 3D environments.",
                statusText: "ENGINE DEV",
                url: "#"
            },
            {
                title: "Open Source Contributor",
                desc: "Roadmap to GSoC 2027. Analyzing and contributing to major repositories like PSF, Zulip, and urllib3.",
                statusText: "PROTOCOL ACTIVE",
                url: "#"
            },
            {
                title: "MIT Attendance Hub",
                desc: "Full-stack portal featuring secure user auth, API key management, and automated CSV data handling.",
                statusText: "LIVE DEPLOYMENT",
                url: "https://github.com/ROYALKINGSJ/attendance-calculator"
            }
        ];

        // --- DOM RENDERER ---
        const commsDiv = document.getElementById('comms-container');
        COMMUNICATIONS.forEach(link => {
            commsDiv.innerHTML += `<a href="${link.url}" target="_blank" class="comm-btn"><img src="${link.icon}" alt="icon"> ${link.name}</a>`;
        });

        const skillsDiv = document.getElementById('skills-container');
        SKILLS.forEach(skill => {
            skillsDiv.innerHTML += `<div class="skill-node">${skill}</div>`;
        });

        const projectsDiv = document.getElementById('projects-container');
        PROJECTS.forEach(proj => {
            const targetAttr = proj.url !== "#" ? 'target="_blank"' : '';
            projectsDiv.innerHTML += `
                <a href="${proj.url}" ${targetAttr} class="project-card">
                    <h3 class="proj-title">${proj.title}</h3>
                    <p class="proj-desc">${proj.desc}</p>
                    <div class="proj-meta">
                        <div class="proj-status">${proj.statusText}</div>
                        <span>>_</span>
                    </div>
                </a>
            `;
        });


        // ==========================================
        // 2. LIGHT / DARK MODE TOGGLE
        // ==========================================
        const savedTheme = localStorage.getItem("portfolio-theme") || "dark";
        document.documentElement.setAttribute("data-theme", savedTheme);
        updateThemeBtn(savedTheme);

        function toggleTheme() {
            const current = document.documentElement.getAttribute("data-theme");
            const newTheme = current === "light" ? "dark" : "light";
            document.documentElement.setAttribute("data-theme", newTheme);
            localStorage.setItem("portfolio-theme", newTheme);
            updateThemeBtn(newTheme);
        }

        function updateThemeBtn(theme) {
            document.getElementById("theme-toggle").innerText = theme === "light" ? "🌙 DARK MODE" : "☀️ LIGHT MODE";
        }


        // ==========================================
        // 3. GENERATIVE ABSTRACT BACKGROUND (CANVAS)
        // ==========================================
        const bgCanvas = document.getElementById('bgCanvas');
        const bgCtx = bgCanvas.getContext('2d');
        let orbs = [];
        let globalHue = 275; // Global hue used to sync the UI

        class Orb {
            constructor(canvasWidth, canvasHeight) {
                this.x = Math.random() * canvasWidth;
                this.y = Math.random() * canvasHeight;
                // Random velocity
                this.vx = (Math.random() - 0.5) * 1.5;
                this.vy = (Math.random() - 0.5) * 1.5;
                // Massive sizes for smooth gradients
                this.radius = Math.random() * 300 + 400; 
                // Start around purple/blue spectrum
                this.hue = Math.random() * 100 + 200; 
                this.hueSpeed = (Math.random() - 0.5) * 0.5;
                
                // Brightness flickering logic
                this.baseAlpha = Math.random() * 0.4 + 0.3;
                this.currentAlpha = this.baseAlpha;
                this.targetAlpha = this.baseAlpha;
            }

            update(canvasWidth, canvasHeight) {
                // Move
                this.x += this.vx;
                this.y += this.vy;

                // Bounce off walls smoothly
                if (this.x < -this.radius || this.x > canvasWidth + this.radius) this.vx *= -1;
                if (this.y < -this.radius || this.y > canvasHeight + this.radius) this.vy *= -1;

                // Shift color organically
                this.hue += this.hueSpeed;
                if (this.hue > 360) this.hue = 0;
                if (this.hue < 0) this.hue = 360;

                // Randomly surge brightness to simulate electrical flicker
                if (Math.random() < 0.02) {
                    this.targetAlpha = Math.random() * 0.8 + 0.2; // Surge
                } else if (Math.random() < 0.05) {
                    this.targetAlpha = this.baseAlpha; // Return to normal
                }
                
                // Ease alpha towards target
                this.currentAlpha += (this.targetAlpha - this.currentAlpha) * 0.05;
            }

            draw(ctx, isLightMode) {
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
                
                // In light mode, we use darker, more saturated colors for the abstract blobs
                const saturation = isLightMode ? '90%' : '100%';
                const lightness = isLightMode ? '30%' : '50%';
                
                gradient.addColorStop(0, `hsla(${this.hue}, ${saturation}, ${lightness}, ${this.currentAlpha})`);
                gradient.addColorStop(1, `hsla(${this.hue}, ${saturation}, ${lightness}, 0)`);
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initBgCanvas() {
            bgCanvas.width = window.innerWidth;
            bgCanvas.height = window.innerHeight;
            
            // Create 4-5 large orbs
            orbs = [];
            const orbCount = window.innerWidth < 800 ? 3 : 5;
            for (let i = 0; i < orbCount; i++) {
                orbs.push(new Orb(bgCanvas.width, bgCanvas.height));
            }
        }

        function animateBgCanvas() {
            // Clear canvas
            bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
            
            const isLightMode = document.documentElement.getAttribute('data-theme') === 'light';
            
            // Blend modes to make the colors mix together organically
            bgCtx.globalCompositeOperation = isLightMode ? 'multiply' : 'screen';

            let avgHue = 0;

            for (let i = 0; i < orbs.length; i++) {
                orbs[i].update(bgCanvas.width, bgCanvas.height);
                orbs[i].draw(bgCtx, isLightMode);
                avgHue += orbs[i].hue;
            }
            
            // Sync the UI CSS Variables to the average color of the moving orbs!
            globalHue = avgHue / orbs.length;
            document.documentElement.style.setProperty('--dynamic-hue', globalHue);

            bgCtx.globalCompositeOperation = 'source-over'; // Reset
            requestAnimationFrame(animateBgCanvas);
        }

        window.addEventListener('resize', () => {
            bgCanvas.width = window.innerWidth;
            bgCanvas.height = window.innerHeight;
        });

        initBgCanvas();
        animateBgCanvas();


        // ==========================================
        // 4. LED MATRIX GLITCH ENGINE (CANVAS)
        // ==========================================
        const ledCanvas = document.getElementById('ledCanvas');
        const ledCtx = ledCanvas.getContext('2d', { willReadFrequently: true });
        
        let dots = [];
        const DOT_SIZE = 4;
        const GAP = 2;
        const SPACING = DOT_SIZE + GAP;

        function initLEDMatrix() {
            const wrapper = document.querySelector('.led-wrapper');
            ledCanvas.width = wrapper.clientWidth;
            ledCanvas.height = wrapper.clientHeight;

            const offCanvas = document.createElement('canvas');
            offCanvas.width = ledCanvas.width;
            offCanvas.height = ledCanvas.height;
            const oCtx = offCanvas.getContext('2d', { willReadFrequently: true });

            oCtx.fillStyle = 'white';
            oCtx.textBaseline = 'middle';
            oCtx.textAlign = 'center';
            
            const targetText = "SANSKAR JAISWAL";
            let fontSize = ledCanvas.width / (targetText.length * 0.55); 
            if (fontSize > 110) fontSize = 110; 
            
            oCtx.font = `900 ${fontSize}px 'Rajdhani', sans-serif`;
            oCtx.fillText(targetText, ledCanvas.width / 2, ledCanvas.height / 2);

            const imgData = oCtx.getImageData(0, 0, ledCanvas.width, ledCanvas.height).data;
            dots = [];

            for (let y = 0; y < ledCanvas.height; y += SPACING) {
                for (let x = 0; x < ledCanvas.width; x += SPACING) {
                    const i = (y * ledCanvas.width + x) * 4;
                    if (imgData[i + 3] > 128) {
                        dots.push({ x: x, y: y, baseAlpha: 1, currentAlpha: 1 });
                    }
                }
            }
        }

        let lastGlitchTime = 0;
        const GLITCH_SPEED_MS = 150; // Controls how fast the pixels flicker

        function animateLEDMatrix(timestamp) {
            if (!lastGlitchTime) lastGlitchTime = timestamp;
            const delta = timestamp - lastGlitchTime;

            // Recalculate glitch pattern slowly
            if (delta > GLITCH_SPEED_MS) {
                for (let i = 0; i < dots.length; i++) {
                    if (Math.random() < 0.12) {
                        dots[i].currentAlpha = 0.15; 
                    } else {
                        dots[i].currentAlpha = dots[i].baseAlpha; 
                    }
                }
                lastGlitchTime = timestamp;
            }

            ledCtx.clearRect(0, 0, ledCanvas.width, ledCanvas.height);
            ledCtx.shadowBlur = 15;

            // Tie the LED color to the dynamic globalHue calculated by the background!
            const theme = document.documentElement.getAttribute('data-theme');
            const lightness = theme === 'light' ? '30%' : '60%'; 
            
            ledCtx.shadowColor = `hsl(${globalHue}, 100%, ${lightness})`;

            for (let i = 0; i < dots.length; i++) {
                ledCtx.fillStyle = `hsla(${globalHue}, 100%, ${lightness}, ${dots[i].currentAlpha})`;
                ledCtx.fillRect(dots[i].x, dots[i].y, DOT_SIZE, DOT_SIZE);
            }

            requestAnimationFrame(animateLEDMatrix);
        }

        window.addEventListener('resize', initLEDMatrix);
        
        document.fonts.ready.then(() => {
            initLEDMatrix();
            requestAnimationFrame(animateLEDMatrix);
        });

    </script>
</body>
</html>
