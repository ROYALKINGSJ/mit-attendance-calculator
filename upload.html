    <style>
        /* --- UNIFIED THEME VARIABLES --- */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: #334155;
            --input-bg: #0f172a;
        }

        /* Light Mode Overrides */
        [data-theme="light"] {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #0f172a;
            --text-secondary: #64748b;
            --accent-color: #2563eb;
            --accent-hover: #1d4ed8;
            --border-color: #e2e8f0;
            --input-bg: #f1f5f9;
        }

        /* --- GLOBAL STYLES --- */
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 750px;
            position: relative;
            border: 1px solid var(--border-color);
            min-height: 600px;
            display: flex;
            flex-direction: column;
        }

        /* --- HEADER --- */
        .header-top { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
            height: 40px; 
        }
        
        .repo-link { 
            font-size: 0.85rem; 
            color: var(--accent-color); 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            font-weight: 500;
            opacity: 0.9; 
        }
        .repo-link:hover { opacity: 1; text-decoration: underline; }
        
        .header-actions { display: flex; gap: 10px; }

        .theme-toggle, .btn-reset { 
            background: none; 
            border: 1px solid var(--border-color); 
            cursor: pointer; 
            color: var(--text-color); 
            padding: 6px 12px; 
            border-radius: 8px; 
            font-size: 0.85rem; 
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
            height: 32px;
        }
        .theme-toggle:hover, .btn-reset:hover { background: var(--input-bg); transform: translateY(-1px); border-color: var(--text-secondary); }

        /* --- NAVIGATION TABS --- */
        .nav-container {
            display: flex;
            background-color: var(--input-bg);
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid var(--border-color);
        }

        .nav-tab {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.2s ease;
            cursor: pointer;
            display: block;
        }

        .nav-tab:hover { color: var(--text-color); background-color: rgba(125, 125, 125, 0.1); }

        .nav-tab.active {
            background-color: var(--card-bg);
            color: var(--accent-color);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border: 1px solid var(--border-color);
        }

        /* --- WIP STYLES --- */
        .wip-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }

        h1 { margin: 10px 0 5px 0; font-size: 2rem; letter-spacing: -0.5px; }
        .subtitle { color: var(--text-secondary); font-size: 1.1rem; line-height: 1.6; max-width: 80%; }
        .emoji-icon { font-size: 4rem; margin-bottom: 1rem; }

    </style>
</head>
<body>

<div class="container">
    
    <div class="header-top">
        <a href="https://github.com/ROYALKINGSJ/attendance-calculator" target="_blank" class="repo-link">

            GitHub
            <span id="last-updated" style="margin-left: 5px; opacity: 0.6; font-family: monospace; font-size: 0.75rem;"></span>
        </a>
        
        <div class="header-actions">
            <a href="WEBSITE_MANUAL.pdf" target="_blank" class="btn-reset" style="text-decoration: none;" title="View User Manual">
                📖 Manual
            </a>
            <button class="btn-reset" onclick="location.reload()" title="Refresh Page">↺ Refresh</button>
            <button class="theme-toggle" onclick="toggleTheme()" id="theme-icon">☀️ Light Mode</button>
        </div>
    </div>

    <div class="nav-container">
        <a href="index.html" class="nav-tab">📊 Attendance</a>
        <a href="code.html" class="nav-tab">💻 Code</a>
        <div class="nav-tab active">☁️ Cloud</div>
    </div>

    <div class="wip-container">
        <div class="emoji-icon">🚧</div>
        <h1>Work in Progress</h1>
        <p class="subtitle">The Student Cloud Storage feature is currently undergoing maintenance and upgrades.<br><br>Please check back later!</p>
    </div>

</div>

<script>
    // --- THEME SYNC ---
    const savedTheme = localStorage.getItem("theme") || "dark";
    document.documentElement.setAttribute("data-theme", savedTheme);
    updateThemeIcon(savedTheme);

    window.toggleTheme = () => {
        const current = document.documentElement.getAttribute("data-theme");
        const newTheme = current === "light" ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
        updateThemeIcon(newTheme);
    }
    
    function updateThemeIcon(theme) { 
        document.getElementById("theme-icon").innerText = theme === "light" ? "🌙 Dark Mode" : "☀️ Light Mode"; 
    }

    // --- GITHUB DATE FETCH ---
    const REPO_USER = "ROYALKINGSJ";
    const REPO_NAME = "attendance-calculator"; 
    
    async function fetchLastUpdated() {
        const textEl = document.getElementById('last-updated');
        try {
            const res = await fetch(`https://api.github.com/repos/${REPO_USER}/${REPO_NAME}/commits?per_page=1`);
            const data = await res.json();
            const date = new Date(data[0].commit.author.date);
            textEl.innerText = date.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
        } catch (e) { 
            console.log("Date fetch failed"); 
        }
    }
    fetchLastUpdated();
</script>
